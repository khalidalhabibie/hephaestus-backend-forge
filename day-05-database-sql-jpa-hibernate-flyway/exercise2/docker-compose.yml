version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: exercise2_postgres
    environment:
      POSTGRES_DB: exercise2_training
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: