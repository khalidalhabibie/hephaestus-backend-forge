spring.application.name=demoSpringbootDatabase

spring.datasource.url=jdbc:postgresql://localhost:5432/finance_training
spring.datasource.username=postgres
spring.datasource.password=postgres

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - [%X{correlation_id}] - %msg%n

loan.interest.annual-rate=0.12