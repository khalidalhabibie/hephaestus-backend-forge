spring.application.name=day2
spring.jackson.property-naming-strategy=SNAKE_CASE
server.port=8081

# H2 Database
spring.datasource.url=jdbc:h2:file:./data/customerdb;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JWT - Override jwt.secret with a strong env var in production!
jwt.secret=bXluaWNvbW1lcmNlc2VjcmV0a2V5c3VwZXJzZWN1cmVsb25na2V5Zm9yandk
jwt.expiration=86400000

# CORS
app.cors.allowed-origins=http://localhost:3000,http://localhost:5173,http://localhost:8080

loan.manager.approval-threshold=10000000
