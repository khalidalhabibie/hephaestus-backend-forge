spring.application.name=training
# Koneksi ke PostgreSQL
# Pastikan database "finance_training" sudah dibuat dulu di pgAdmin atau psql
spring.datasource.url=jdbc:postgresql://localhost:5432/finance_training
spring.datasource.username=postgres
spring.datasource.password=postgres

# validate = Hibernate tidak buat/ubah tabel sendiri,
# semua perubahan tabel harus lewat Flyway migration
spring.jpa.hibernate.ddl-auto=validate

# Tampilkan SQL yang dijalankan di console — berguna untuk debugging
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Flyway aktif, cari migration di folder db/migration
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

